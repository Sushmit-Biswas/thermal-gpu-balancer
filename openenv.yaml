spec_version: 1
name: clusterops
type: space
runtime: fastapi
app: server.app:app
port: 8000

environment:
  reset_endpoint: /reset
  step_endpoint: /step
  state_endpoint: /state
  grader_endpoint: /grader
  schema_endpoint: /schema
  health_endpoint: /health
  difficulties:
    - easy
    - medium
    - hard
    - expert
  scenarios:
    - 01_baseline
    - 02_spatial_bleed
    - 03_heterogeneous
    - 04_maintenance
    - 05_adversarial
  concurrent_sessions: true

metadata:
  title: "ClusterOps: Thermal GPU Balancer"
  emoji: "🔥"
  description: >
    A high-stakes data center scheduler simulation where an LLM agent must
    allocate GPU training/inference jobs across a cluster of nodes while
    managing adversarial thermal constraints and random hardware failures.
  tags:
    - openenv
    - reinforcement-learning
    - llm-agents
    - gpu-scheduling
    - thermal-management
    - data-center
    - control-systems
  license: MIT
